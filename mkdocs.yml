site_name: MainSequence Markets
site_description: Financial markets ORM, engines, and application management extensions for Main Sequence.
site_url: https://mainsequence-projects.github.io/MainSequenceMarkets/
repo_url: https://github.com/mainsequence-projects/MainSequenceMarkets
repo_name: mainsequence-projects/MainSequenceMarkets
edit_uri: edit/main/docs/
dev_addr: 127.0.0.1:8004

theme:
  name: material
  logo: img/main-sequence-markets/main_sequence_markets_icon_emblem_transparent.png
  palette:
    scheme: slate
    primary: black
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.footer
    - navigation.indexes
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts: concepts.md
  - Tutorial:
      - Overview: tutorial/index.md
      - Assets And Categories: tutorial/01-assets.md
      - Calendars: tutorial/02-calendars.md
      - Accounts And Holdings: tutorial/03-accounts.md
      - Portfolios: tutorial/04-portfolios.md
      - Pricing Instruments: tutorial/05-pricing.md
  - msm:
