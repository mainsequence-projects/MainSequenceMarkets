          - Benchmark Curve Resolution: planning/implementation_tasks/benchmark_curve_resolution_plan.md
          - Reusable Valuation Portfolio Scenario And Analytics: planning/implementation_tasks/reusable_valuation_portfolio_scenario_analytics_plan.md
  - Changelog: changelog.md
  - Reference:
      - API Reference: reference/index.md

plugins:
  - search
  - autorefs
  - mermaid2
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            heading_level: 3
            allow_inspection: false
            show_bases: true
            show_source: false
            show_root_heading: true

extra_javascript:
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
