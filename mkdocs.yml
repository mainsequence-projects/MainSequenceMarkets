site_name: MainSequence Markets
site_description: Financial markets ORM, engines, and application management extensions for Main Sequence.
site_url: https://mainsequence-projects.github.io/MainSequenceMarkets/
repo_url: https://github.com/mainsequence-projects/MainSequenceMarkets
repo_name: mainsequence-projects/MainSequenceMarkets
edit_uri: edit/main/docs/
dev_addr: 127.0.0.1:8004

theme:
  name: material
  logo: img/main-sequence-markets/main_sequence_markets_icon_emblem_transparent.png
  palette:
    scheme: slate
    primary: black
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.footer
    - navigation.indexes
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorial:
      - Overview: tutorial/index.md
      - Market Workflows: tutorial/market_workflows.md
  - FastAPI:
      - v1: fast_api/v1/index.md
      - Settings: fast_api/v1/settings.md
      - Portfolio: fast_api/v1/portfolio.md
      - Portfolio Signal Metadata: fast_api/v1/portfolio_signal_metadata.md
      - Virtual Funds: fast_api/v1/virtualfund.md
      - Pricing Curves: fast_api/v1/pricing_curves.md
      - Pricing Market Data: fast_api/v1/pricing_market_data.md
      - Fixed Income Pricer: fast_api/v1/fixed_income_pricer.md
      - ADR:
          - Calendar CRUD Route: fast_api/v1/ADR/0001-calendar-crud-route.md
          - Fixed Income Pricer API: ADR/fast_api/v1/fixed-income-pricer-api.md
  - Knowledge:
      - Overview: knowledge/index.md
      - msm:
          - Overview: knowledge/msm/index.md
          - Accounts:
              - Overview: knowledge/msm/accounts/index.md
              - Virtual Funds: knowledge/msm/accounts/virtual_funds.md
          - Assets:
              - Overview: knowledge/msm/assets/index.md
              - Bond Assets: knowledge/msm/assets/bonds.md
              - Currency And Spot Assets: knowledge/msm/assets/currency.md
              - Asset-Indexed DataNodes: knowledge/msm/assets/asset_indexed_data_nodes.md
          - Calendars: knowledge/msm/calendars/index.md
          - Client: knowledge/msm/client/index.md
          - Derivatives:
              - Overview: knowledge/msm/derivatives/index.md
              - Futures: knowledge/msm/derivatives/futures.md
          - Execution: knowledge/msm/execution/index.md
          - Indexes: knowledge/msm/indices/index.md
          - Migrations: knowledge/msm/migrations/index.md
          - Models: knowledge/msm/models/index.md
          - Platform:
              - Overview: knowledge/msm/platform/index.md
              - MetaTable Registration: knowledge/msm/platform/meta_table_registration.md
              - MetaTable Migrations: knowledge/msm/platform/metatable_migrations.md
          - Repositories: knowledge/msm/repositories/index.md
          - Services: knowledge/msm/services/index.md
      - msm_portfolios:
          - Overview: knowledge/msm_portfolios/index.md
          - Portfolios: knowledge/msm_portfolios/portfolios/index.md
      - msm_pricing:
          - Overview: knowledge/msm_pricing/index.md
  - Architecture:
      - ADR: ADR/README.md
      - Pricing Package Refactor: ADR/0005-pricing-package-refactor.md
      - Asset Package Boundary: ADR/0006-asset-package-boundary.md
      - MetaTable Table And API Model Split: ADR/0008-metatable-table-and-api-model-split.md
      - msm_portfolios Package Boundary: ADR/0019-msm-portfolios-package-boundary.md
      - Thin Alembic MetaTable Migration Integration: ADR/0022-alembic-metatable-migration-alignment.md
      - Deterministic Alembic Schema And Identifier Naming: ADR/0023-deterministic-alembic-naming.md
      - Namespace-Scoped Alembic Version Locations: ADR/0024-namespace-scoped-alembic-version-locations.md
      - Direct MetaTable Runtime Binding: ADR/0025-direct-metatable-runtime-binding.md
      - Explicit Pricing Market Data Sets: ADR/0026-explicit-pricing-market-data-sets.md
      - Account Target Position Portfolio Exposure: ADR/0027-account-target-position-portfolio-exposure.md
      - Core Calendar Reference Data Model: ADR/0028-core-calendar-reference-data.md
      - Account Holdings To Virtual Fund Allocation Policy: ADR/0029-account-holdings-virtual-fund-allocation-policy.md
      - Explicit Portfolio Price Source Dependency: ADR/0030-explicit-portfolio-price-source-dependency.md
      - FastAPI v1 Fixed Income Pricer API: ADR/fast_api/v1/fixed-income-pricer-api.md
  - Changelog: changelog.md
  - Reference:
      - API Reference: reference/index.md

plugins:
  - search
  - autorefs
  - mermaid2
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            heading_level: 3
            allow_inspection: false
            show_bases: true
            show_source: false
            show_root_heading: true

extra_javascript:
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
